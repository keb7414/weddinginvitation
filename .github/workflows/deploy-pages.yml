name: Deploy frontend to GitHub Pages

# main 에 push 되면 frontend/ 를 정적 빌드해 GitHub Pages 로 배포.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # GitHub Pages 빌드 표시 — next.config 가 이 값일 때만 정적 export + basePath 적용
      GITHUB_PAGES: "true"
      # 프로젝트 페이지 하위 경로(/<repo>). 커스텀 도메인 사용 시 빈 값으로 변경.
      NEXT_PUBLIC_BASE_PATH: /weddinginvitation
      # Supabase 연결 — 리포지토리 Settings → Secrets and variables → Actions 에 등록
      #  · Variables: SUPABASE_URL
      #  · Secrets:   SUPABASE_ANON_KEY
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # 카카오맵 JavaScript 키 — Variables: KAKAO_MAP_KEY (도메인 제한된 공개 키)
      NEXT_PUBLIC_KAKAO_MAP_KEY: ${{ vars.KAKAO_MAP_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      # _next 등 underscore 폴더가 Jekyll 에 무시되지 않도록
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
