###########################################################################
### server
###########################################################################
server:
  port: 8081   # 프론트(Next.js 3000)와 분리

###########################################################################
### Spring
###########################################################################
spring:
  application:
    name: invitation-api

  ### datasource ─ 로컬 MariaDB (invitation) ───────────────────────────
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mariadb://localhost:3306/invitation?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8mb4
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      connection-timeout: 30000
      minimum-idle: 2
      maximum-pool-size: 10

###########################################################################
### MyBatis
###########################################################################
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL

###########################################################################
### Swagger
###########################################################################
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    doc-expansion: none

###########################################################################
### 로깅
###########################################################################
logging:
  level:
    root: info
    kr.comes.invitation: debug
    com.zaxxer.hikari: warn
    com.p6spy: debug
